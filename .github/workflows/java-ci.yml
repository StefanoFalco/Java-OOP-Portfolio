name: Java CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Test ${{ matrix.project }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project:
          - oop-tv-series-database
          - oop-project-review-scheduler
          - oop-university-management
          - oop-medical-clinic
          - oop-social-network

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install Xvfb for Swing GUI tests
        if: matrix.project == 'oop-social-network'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run Maven tests
        working-directory: ${{ matrix.project }}
        shell: bash
        run: |
          if [ "${{ matrix.project }}" = "oop-social-network" ]; then
            xvfb-run -a mvn clean test
          else
            mvn clean test
          fi
